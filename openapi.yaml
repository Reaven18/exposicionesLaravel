openapi: 3.0.3
info:
  title: 'ExposicionesLaravel API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  -
    name: 'Gestión de Alumnos'
    description: "\nEndpoints para administrar alumnos de la institución."
  -
    name: 'Gestión de Autenticación'
    description: "\nEndpoints para administrar el acceso al sistema."
  -
    name: 'Gestión de Equipos'
    description: "\nEndpoints para administrar los equipos de trabajo, sus integrantes y su relación con las materias."
  -
    name: 'Gestión de Evaluaciones'
    description: "\nEndpoints para registrar y consultar las evaluaciones realizadas por los usuarios a las exposiciones."
  -
    name: 'Gestión de Exposiciones'
    description: "\nEndpoints para programar, actualizar y consultar las exposiciones de los equipos."
  -
    name: 'Gestión de Grupos'
    description: "\nEndpoints para administrar Grupos de una materia y la inscripción de alumnos."
  -
    name: 'Gestión de Maestros'
    description: "\nEndpoints para la administración de docentes, incluyendo la creación de su cuenta de usuario vinculada."
  -
    name: 'Gestión de Materias'
    description: "\nEndpoints para la gestión del catálogo de materias de la institución."
  -
    name: 'Gestión de Rúbricas'
    description: "\nEndpoints para definir las rúbricas de evaluación y sus criterios (porcentajes) correspondientes."
paths:
  /api/alumnos:
    get:
      summary: 'Listar todos los alumnos.'
      operationId: listarTodosLosAlumnos
      description: '* Obtiene una lista de todos los alumnos registrados junto con su información de usuario.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    -
                      id_usuario: 1
                      num_ctrl: '19030001'
                      usuario:
                        id_usuario: 1
                        nombre: 'Juan Pérez'
                        email: juan@example.com
                        id_rol: 2
                  message: 'Lista de alumnos recuperada.'
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example:
                      -
                        id_usuario: 1
                        num_ctrl: '19030001'
                        usuario:
                          id_usuario: 1
                          nombre: 'Juan Pérez'
                          email: juan@example.com
                          id_rol: 2
                    items:
                      type: object
                      properties:
                        id_usuario:
                          type: integer
                          example: 1
                        num_ctrl:
                          type: string
                          example: '19030001'
                        usuario:
                          type: object
                          properties:
                            id_usuario:
                              type: integer
                              example: 1
                            nombre:
                              type: string
                              example: 'Juan Pérez'
                            email:
                              type: string
                              example: juan@example.com
                            id_rol:
                              type: integer
                              example: 2
                  message:
                    type: string
                    example: 'Lista de alumnos recuperada.'
      tags:
        - 'Gestión de Alumnos'
      security: []
    post:
      summary: 'Crear un nuevo alumno.'
      operationId: crearUnNuevoAlumno
      description: '* Registra un usuario y su perfil de alumno correspondiente utilizando una transacción.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id_usuario: 1
                    num_ctrl: '19030001'
                    usuario:
                      id_usuario: 1
                      nombre: 'Juan Pérez'
                      email: juan@example.com
                      id_rol: 2
                  message: 'Alumno creado con éxito.'
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id_usuario:
                        type: integer
                        example: 1
                      num_ctrl:
                        type: string
                        example: '19030001'
                      usuario:
                        type: object
                        properties:
                          id_usuario:
                            type: integer
                            example: 1
                          nombre:
                            type: string
                            example: 'Juan Pérez'
                          email:
                            type: string
                            example: juan@example.com
                          id_rol:
                            type: integer
                            example: 2
                  message:
                    type: string
                    example: 'Alumno creado con éxito.'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    email:
                      - 'El correo electrónico ya ha sido registrado.'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'El correo electrónico ya ha sido registrado.'
                        items:
                          type: string
        500:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Error al procesar el registro'
                  data:
                    - 'Algo dentro del servidor falló...'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Error al procesar el registro'
                  data:
                    type: array
                    example:
                      - 'Algo dentro del servidor falló...'
                    items:
                      type: string
      tags:
        - 'Gestión de Alumnos'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  description: 'El nombre completo del alumno.'
                  example: 'Juan Pérez'
                email:
                  type: string
                  description: 'El correo electrónico institucional.'
                  example: juan@example.com
                password:
                  type: string
                  description: 'La contraseña del alumno (mínimo 8 caracteres).'
                  example: password123
                num_ctrl:
                  type: string
                  description: 'El número de control único del alumno.'
                  example: '19030001'
                id_rol:
                  type: integer
                  description: 'El ID del rol que se le asignará.'
                  example: 2
              required:
                - nombre
                - email
                - password
                - num_ctrl
                - id_rol
      security: []
  '/api/alumnos/{id}':
    get:
      summary: 'Mostrar un alumno específico.'
      operationId: mostrarUnAlumnoEspecfico
      description: '* Retorna la información detallada de un alumno por su ID de usuario, incluyendo sus grupos y equipos.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id_usuario: 1
                    num_ctrl: '19030001'
                    usuario:
                      nombre: 'Juan Pérez'
                      email: juan@example.com
                    grupos: []
                    equipos: []
                  message: 'Datos del alumno obtenidos.'
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id_usuario:
                        type: integer
                        example: 1
                      num_ctrl:
                        type: string
                        example: '19030001'
                      usuario:
                        type: object
                        properties:
                          nombre:
                            type: string
                            example: 'Juan Pérez'
                          email:
                            type: string
                            example: juan@example.com
                      grupos:
                        type: array
                        example: []
                      equipos:
                        type: array
                        example: []
                  message:
                    type: string
                    example: 'Datos del alumno obtenidos.'
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Alumno no encontrado.'
                  data: []
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Alumno no encontrado.'
                  data:
                    type: array
                    example: []
      tags:
        - 'Gestión de Alumnos'
      security: []
    put:
      summary: 'Actualizar datos del alumno.'
      operationId: actualizarDatosDelAlumno
      description: '* Actualiza la información básica del usuario y el número de control del alumno.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id_usuario: 1
                    num_ctrl: '19030002'
                    usuario:
                      id_usuario: 1
                      nombre: 'Juan Modificado'
                      email: juan_mod@example.com
                  message: 'Alumno actualizado.'
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id_usuario:
                        type: integer
                        example: 1
                      num_ctrl:
                        type: string
                        example: '19030002'
                      usuario:
                        type: object
                        properties:
                          id_usuario:
                            type: integer
                            example: 1
                          nombre:
                            type: string
                            example: 'Juan Modificado'
                          email:
                            type: string
                            example: juan_mod@example.com
                  message:
                    type: string
                    example: 'Alumno actualizado.'
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Alumno no encontrado.'
                  data: []
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Alumno no encontrado.'
                  data:
                    type: array
                    example: []
      tags:
        - 'Gestión de Alumnos'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  description: 'El nuevo nombre del alumno.'
                  example: 'Juan Modificado'
                email:
                  type: string
                  description: 'El nuevo correo del alumno.'
                  example: juan_mod@example.com
                num_ctrl:
                  type: string
                  description: 'El nuevo número de control.'
                  example: '19030002'
      security: []
    delete:
      summary: 'Eliminar un alumno.'
      operationId: eliminarUnAlumno
      description: '* Elimina lógicamente (o físicamente) al usuario, y en cascada se eliminará su registro de alumno.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data: []
                  message: 'Alumno eliminado correctamente.'
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example: []
                  message:
                    type: string
                    example: 'Alumno eliminado correctamente.'
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Usuario no existe.'
                  data: []
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Usuario no existe.'
                  data:
                    type: array
                    example: []
      tags:
        - 'Gestión de Alumnos'
      security: []
    parameters:
      -
        in: path
        name: id
        description: 'El ID del usuario asociado al alumno.'
        example: 1
        required: true
        schema:
          type: integer
  /api/login:
    post:
      summary: 'Inicio de sesión.'
      operationId: inicioDeSesin
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    token: 1|ra67sdf...
                    user:
                      id_usuario: 1
                      nombre: Admin
                      email: admin@example.com
                      id_rol: 1
                      created_at: '2026-03-06T18:01:01.000000Z'
                      updated_at: '2026-03-06T18:01:01.000000Z'
                      rol:
                        id_rol: 1
                        nombre_rol: Maestro
                        created_at: '2026-03-06T18:01:00.000000Z'
                        updated_at: '2026-03-06T18:01:00.000000Z'
                  message: 'Usuario autenticado con éxito.'
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|ra67sdf...
                      user:
                        type: object
                        properties:
                          id_usuario:
                            type: integer
                            example: 1
                          nombre:
                            type: string
                            example: Admin
                          email:
                            type: string
                            example: admin@example.com
                          id_rol:
                            type: integer
                            example: 1
                          created_at:
                            type: string
                            example: '2026-03-06T18:01:01.000000Z'
                          updated_at:
                            type: string
                            example: '2026-03-06T18:01:01.000000Z'
                          rol:
                            type: object
                            properties:
                              id_rol:
                                type: integer
                                example: 1
                              nombre_rol:
                                type: string
                                example: Maestro
                              created_at:
                                type: string
                                example: '2026-03-06T18:01:00.000000Z'
                              updated_at:
                                type: string
                                example: '2026-03-06T18:01:00.000000Z'
                  message:
                    type: string
                    example: 'Usuario autenticado con éxito.'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Credenciales incorrectas.'
                  data:
                    error: 'No autorizado'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Credenciales incorrectas.'
                  data:
                    type: object
                    properties:
                      error:
                        type: string
                        example: 'No autorizado'
      tags:
        - 'Gestión de Autenticación'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'El correo del usuario.'
                  example: admin@example.com
                password:
                  type: string
                  description: 'La contraseña.'
                  example: password
              required:
                - email
                - password
      security: []
  /api/me:
    get:
      summary: 'Obtener perfil del usuario logueado.'
      operationId: obtenerPerfilDelUsuarioLogueado
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id_usuario: 1
                    nombre: 'Profe Troncoso'
                    email: maestro@test.com
                    id_rol: 1
                    created_at: '2026-03-06T18:01:01.000000Z'
                    updated_at: '2026-03-06T18:01:01.000000Z'
                    rol:
                      id_rol: 1
                      nombre_rol: Maestro
                      created_at: '2026-03-06T18:01:00.000000Z'
                      updated_at: '2026-03-06T18:01:00.000000Z'
                    alumno: null
                    maestro:
                      id_usuario: 1
                      created_at: '2026-03-06T18:01:01.000000Z'
                      updated_at: '2026-03-06T18:01:01.000000Z'
                      grupos: []
                  message: 'Datos del usuario logueado.'
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id_usuario:
                        type: integer
                        example: 1
                      nombre:
                        type: string
                        example: 'Profe Troncoso'
                      email:
                        type: string
                        example: maestro@test.com
                      id_rol:
                        type: integer
                        example: 1
                      created_at:
                        type: string
                        example: '2026-03-06T18:01:01.000000Z'
                      updated_at:
                        type: string
                        example: '2026-03-06T18:01:01.000000Z'
                      rol:
                        type: object
                        properties:
                          id_rol:
                            type: integer
                            example: 1
                          nombre_rol:
                            type: string
                            example: Maestro
                          created_at:
                            type: string
                            example: '2026-03-06T18:01:00.000000Z'
                          updated_at:
                            type: string
                            example: '2026-03-06T18:01:00.000000Z'
                      alumno:
                        type: string
                        example: null
                        nullable: true
                      maestro:
                        type: object
                        properties:
                          id_usuario:
                            type: integer
                            example: 1
                          created_at:
                            type: string
                            example: '2026-03-06T18:01:01.000000Z'
                          updated_at:
                            type: string
                            example: '2026-03-06T18:01:01.000000Z'
                          grupos:
                            type: array
                            example: []
                  message:
                    type: string
                    example: 'Datos del usuario logueado.'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - 'Gestión de Autenticación'
  /api/logout:
    post:
      summary: 'Cerrar sesión.'
      operationId: cerrarSesin
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data: []
                  message: 'Sesión cerrada y token eliminado.'
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example: []
                  message:
                    type: string
                    example: 'Sesión cerrada y token eliminado.'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - 'Gestión de Autenticación'
  /api/register:
    post:
      summary: 'Registro de usuario.'
      operationId: registroDeUsuario
      description: ''
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    token: 4|Y7CHpCxOr...
                    user:
                      nombre: maestro
                      email: maestro@mail.com
                      id_rol: 2
                      updated_at: '2026-03-08T05:50:38.000000Z'
                      created_at: '2026-03-08T05:50:38.000000Z'
                      id_usuario: 3
                      rol:
                        id_rol: 2
                        nombre_rol: Alumno
                        created_at: '2026-03-06T18:01:00.000000Z'
                        updated_at: '2026-03-06T18:01:00.000000Z'
                  message: 'Usuario registrado correctamente.'
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 4|Y7CHpCxOr...
                      user:
                        type: object
                        properties:
                          nombre:
                            type: string
                            example: maestro
                          email:
                            type: string
                            example: maestro@mail.com
                          id_rol:
                            type: integer
                            example: 2
                          updated_at:
                            type: string
                            example: '2026-03-08T05:50:38.000000Z'
                          created_at:
                            type: string
                            example: '2026-03-08T05:50:38.000000Z'
                          id_usuario:
                            type: integer
                            example: 3
                          rol:
                            type: object
                            properties:
                              id_rol:
                                type: integer
                                example: 2
                              nombre_rol:
                                type: string
                                example: Alumno
                              created_at:
                                type: string
                                example: '2026-03-06T18:01:00.000000Z'
                              updated_at:
                                type: string
                                example: '2026-03-06T18:01:00.000000Z'
                  message:
                    type: string
                    example: 'Usuario registrado correctamente.'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The password field confirmation does not match. (and 1 more error)'
                  errors:
                    password:
                      - 'The password field confirmation does not match.'
                    id_rol:
                      - 'The id rol field is required.'
                properties:
                  message:
                    type: string
                    example: 'The password field confirmation does not match. (and 1 more error)'
                  errors:
                    type: object
                    properties:
                      password:
                        type: array
                        example:
                          - 'The password field confirmation does not match.'
                        items:
                          type: string
                      id_rol:
                        type: array
                        example:
                          - 'The id rol field is required.'
                        items:
                          type: string
      tags:
        - 'Gestión de Autenticación'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  description: 'Nombre completo.'
                  example: 'Nuevo Usuario'
                email:
                  type: string
                  description: 'Correo único.'
                  example: nuevo@example.com
                password:
                  type: string
                  description: 'Mínimo 8 caracteres.'
                  example: password123
                id_rol:
                  type: integer
                  description: 'ID del rol.'
                  example: 2
              required:
                - nombre
                - email
                - password
                - id_rol
      security: []
  /api/equipos:
    get:
      summary: 'Listar equipos.'
      operationId: listarEquipos
      description: '* Obtiene una lista de todos los equipos con su materia e integrantes.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "{\n\"success\": true,\n\"data\": [\n{\n\"id_equipo\": 1,\n\"id_grupo\": 2,\n\"equipo\": \"Los Dinamita\",\n\"active\": 1,\n\"created_at\": \"2026-03-08T10:00:00.000000Z\",\n\"updated_at\": \"2026-03-08T10:00:00.000000Z\",\n\"grupo\": {\n\"id_grupo\": 2,\n\"id_materia\": 5,\n\"materia\": {\n\"id_materia\": 5,\n\"nombre_materia\": \"Programación Web\"\n}\n},\n\"integrantes\": [\n{\n\"id_usuario\": 10,\n\"nombre\": \"Juan Pérez\",\n\"email\": \"juan@example.com\",\n\"usuario\": {\n\"id_usuario\": 10,\n\"nombre\": \"Juan Pérez\"\n}\n}\n]\n}\n],\n\"message\": \"Equipos recuperados exitosamente.\""
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - 'Gestión de Equipos'
    post:
      summary: 'Crear un equipo.'
      operationId: crearUnEquipo
      description: '* Crea un nuevo equipo y asigna los alumnos integrantes mediante una transacción.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id_equipo: 5
                    id_grupo: 1
                    equipo: 'Los Dinamita'
                    active: true
                    created_at: '2026-03-08T12:00:00.000000Z'
                    updated_at: '2026-03-08T12:00:00.000000Z'
                    integrantes:
                      -
                        id_usuario: 10
                        nombre: 'Juan Pérez'
                      -
                        id_usuario: 11
                        nombre: 'Maria Lopez'
                  message: 'Equipo creado e integrantes asignados.'
                properties:
                  success:
